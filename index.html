<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庞筱妍 · 简历集合</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #FAFAFA;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p.sub {
      color: #6B6B6B;
      font-size: 0.95rem;
      margin-bottom: 40px;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: #B87333;
      margin: 0 auto 40px;
      border-radius: 1px;
    }
    .resume-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .resume-item {
      display: block;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      text-align: left;
    }
    .resume-item:hover {
      border-color: #B87333;
      transform: translateY(-1px);
    }
    .resume-item .company {
      font-size: 0.8rem;
      color: #B87333;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .resume-item .position {
      font-size: 1rem;
      font-weight: 500;
      color: #1A1A1A;
    }
    .resume-item .arrow {
      float: right;
      color: #999;
      margin-top: 4px;
      transition: color 0.3s;
    }
    .resume-item:hover .arrow {
      color: #B87333;
    }
    .hint {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>庞筱妍</h1>
    <p class="sub">澳门大学 · 数据科学硕士<br>北京交通大学 · 光电信息科学与工程本科</p>
    <div class="divider"></div>

    <div class="resume-list">
      <a class="resume-item" href="./resumes/century-game/ai-video-intern/">
        <span class="arrow">→</span>
        <div class="company">点点互动 CENTURY GAME</div>
        <div class="position">AI 视频生成/剪辑实习生</div>
      </a>
    </div>

    <p class="hint">
      每份简历针对具体岗位 JD 定制<br>
      包含与该岗位匹配的能力、项目与作品集
    </p>
  </div>
</body>
</html>
